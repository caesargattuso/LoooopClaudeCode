<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        /* 样式区域 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background-color: #0f0f23;
        }

        .score-board {
            color: #ffffff;
            font-size: 1.5rem;
            margin-top: 15px;
        }

        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇游戏</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="score-board">
            分数: <span id="score">0</span>
        </div>
        <div class="controls">
            <p>使用方向键 ↑ ↓ ← → 控制蛇的移动</p>
            <p>按空格键开始/暂停游戏</p>
        </div>
    </div>

    <script>
        // ==================== Canvas游戏画布实现 ====================

        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // ==================== 游戏配置 ====================
        const gridSize = 20;           // 每个网格的大小（像素）
        const gridCount = canvas.width / gridSize;  // 网格数量
        const colors = {
            background: '#0f0f23',
            grid: '#1a1a3e',
            gridLine: '#252550',
            snakeHead: '#00ff88',
            snakeBody: '#00cc66',
            food: '#ff6b6b',
            text: '#ffffff'
        };

        // ==================== 游戏状态 ====================
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;

        // ==================== 网格绘制函数 ====================
        function drawGrid() {
            // 绘制背景
            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线
            ctx.strokeStyle = colors.gridLine;
            ctx.lineWidth = 0.5;

            // 垂直线
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // 水平线
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        // ==================== 基础渲染框架 ====================
        class GameRenderer {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.entities = [];
            }

            // 添加实体到渲染队列
            addEntity(entity) {
                this.entities.push(entity);
            }

            // 移除实体
            removeEntity(entity) {
                const index = this.entities.indexOf(entity);
                if (index > -1) {
                    this.entities.splice(index, 1);
                }
            }

            // 清空渲染队列
            clearEntities() {
                this.entities = [];
            }

            // 渲染所有实体
            render() {
                // 清除画布并绘制网格
                drawGrid();

                // 渲染所有实体
                this.entities.forEach(entity => {
                    if (entity.visible !== false && typeof entity.draw === 'function') {
                        entity.draw(this.ctx);
                    }
                });
            }

            // 绘制矩形网格单元
            drawCell(x, y, color, radius = 3) {
                const padding = 1;
                const size = gridSize - padding * 2;
                const px = x * gridSize + padding;
                const py = y * gridSize + padding;

                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.roundRect(px, py, size, size, radius);
                this.ctx.fill();
            }

            // 绘制文本
            drawText(text, x, y, options = {}) {
                const {
                    color = colors.text,
                    font = '20px Microsoft YaHei',
                    align = 'center',
                    baseline = 'middle'
                } = options;

                this.ctx.fillStyle = color;
                this.ctx.font = font;
                this.ctx.textAlign = align;
                this.ctx.textBaseline = baseline;
                this.ctx.fillText(text, x, y);
            }
        }

        // ==================== 游戏循环框架 ====================
        class GameLoop {
            constructor(fps = 10) {
                this.fps = fps;
                this.frameTime = 1000 / fps;
                this.lastTime = 0;
                this.running = false;
                this.updateCallback = null;
                this.renderCallback = null;
            }

            setSpeed(fps) {
                this.fps = fps;
                this.frameTime = 1000 / fps;
            }

            start() {
                this.running = true;
                this.lastTime = performance.now();
                this.loop();
            }

            stop() {
                this.running = false;
            }

            loop() {
                if (!this.running) return;

                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastTime;

                if (deltaTime >= this.frameTime) {
                    this.lastTime = currentTime - (deltaTime % this.frameTime);

                    // 执行更新和渲染回调
                    if (this.updateCallback) this.updateCallback();
                    if (this.renderCallback) this.renderCallback();
                }

                requestAnimationFrame(() => this.loop());
            }

            onUpdate(callback) {
                this.updateCallback = callback;
            }

            onRender(callback) {
                this.renderCallback = callback;
            }
        }

        // ==================== 初始化实例 ====================
        const renderer = new GameRenderer(canvas, ctx);
        const gameLoop = new GameLoop(10);

        // ==================== 初始化显示 ====================
        function init() {
            drawGrid();
            renderer.drawText('按空格键开始游戏', canvas.width / 2, canvas.height / 2);
        }

        // ==================== 键盘事件监听 ====================
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning) {
                    startGame();
                } else {
                    togglePause();
                }
            }
        });

        // ==================== 游戏控制函数 ====================
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            score = 0;
            scoreElement.textContent = score;
            gameLoop.start();
            console.log('游戏开始');
        }

        function togglePause() {
            gamePaused = !gamePaused;
            if (gamePaused) {
                gameLoop.stop();
                renderer.drawText('游戏暂停', canvas.width / 2, canvas.height / 2);
            } else {
                gameLoop.start();
            }
            console.log(gamePaused ? '游戏暂停' : '游戏继续');
        }

        // 设置游戏循环回调（后续任务将填充具体逻辑）
        gameLoop.onUpdate(() => {
            // 更新逻辑将在任务3实现
        });

        gameLoop.onRender(() => {
            renderer.render();
            // 分数已在HTML中显示
        });

        // 初始化游戏
        init();
    </script>
</body>
</html>
