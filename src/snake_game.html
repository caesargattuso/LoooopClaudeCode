<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        /* 样式区域 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background-color: #0f0f23;
        }

        .score-board {
            color: #ffffff;
            font-size: 1.5rem;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: center;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        #score {
            transition: color 0.3s ease, transform 0.3s ease, font-weight 0.3s ease;
        }

        .level-display {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #highScore {
            color: #ffcc00;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        #level {
            color: #00ff88;
            font-size: 1rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .level-bar {
            width: 100px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            transition: width 0.3s ease;
        }

        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .game-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .game-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #0f0f23;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        .btn-pause {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #0f0f23;
        }

        .btn-pause:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }

        .btn-restart {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: #ffffff;
        }

        .btn-restart:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .game-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        /* 难度选择样式 */
        .difficulty-panel {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .difficulty-label {
            color: #888;
            font-size: 0.9rem;
        }

        .difficulty-buttons {
            display: flex;
            gap: 10px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            font-size: 0.9rem;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Microsoft YaHei', sans-serif;
            background: #2a2a4e;
            color: #888;
        }

        .difficulty-btn:hover {
            background: #3a3a6e;
            color: #fff;
        }

        .difficulty-btn.active {
            border-color: #00ff88;
            color: #00ff88;
            background: #1a1a3e;
        }

        .difficulty-btn.difficulty-slow.active {
            border-color: #4CAF50;
            color: #4CAF50;
        }

        .difficulty-btn.difficulty-medium.active {
            border-color: #ffcc00;
            color: #ffcc00;
        }

        .difficulty-btn.difficulty-fast.active {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇游戏</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="score-board">
            <div class="score-item">
                <span class="score-label">当前分数</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">最高分</span>
                <span class="score-value" id="highScore">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">等级</span>
                <div class="level-display">
                    <span id="level">1</span>
                    <div class="level-bar">
                        <div class="level-progress" id="levelProgress"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="controls">
            <p>使用方向键 ↑ ↓ ← → 或 WASD 控制蛇的移动</p>
            <p>按空格键开始/暂停游戏</p>
        </div>
        <div class="game-buttons">
            <button id="btnStart" class="game-btn btn-start">开始游戏</button>
            <button id="btnPause" class="game-btn btn-pause" disabled>暂停</button>
            <button id="btnRestart" class="game-btn btn-restart" disabled>重新开始</button>
        </div>
        <div class="difficulty-panel">
            <span class="difficulty-label">难度选择：</span>
            <div class="difficulty-buttons">
                <button id="diffSlow" class="difficulty-btn difficulty-slow">慢速</button>
                <button id="diffMedium" class="difficulty-btn difficulty-medium active">中速</button>
                <button id="diffFast" class="difficulty-btn difficulty-fast">快速</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Canvas游戏画布实现 ====================

        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const levelElement = document.getElementById('level');
        const levelProgressElement = document.getElementById('levelProgress');

        // 获取按钮元素
        const btnStart = document.getElementById('btnStart');
        const btnPause = document.getElementById('btnPause');
        const btnRestart = document.getElementById('btnRestart');

        // ==================== 游戏配置 ====================
        const gridSize = 20;           // 每个网格的大小（像素）
        const gridCount = canvas.width / gridSize;  // 网格数量
        const colors = {
            background: '#0f0f23',
            grid: '#1a1a3e',
            gridLine: '#252550',
            snakeHead: '#ffcc00',      // 蛇头使用金黄色，更加醒目
            snakeBodyStart: '#00cc66', // 蛇身起始颜色（靠近头部）
            snakeBodyEnd: '#005533',   // 蛇身结束颜色（靠近尾部），形成渐变
            food: '#ff6b6b',
            text: '#ffffff'
        };

        // ==================== 游戏状态管理类 ====================
        class GameState {
            constructor() {
                this.status = 'idle';  // idle, running, paused, ended
                this.lastCollisionType = null;
            }

            // 状态判断方法
            isIdle() { return this.status === 'idle'; }
            isRunning() { return this.status === 'running'; }
            isPaused() { return this.status === 'paused'; }
            isEnded() { return this.status === 'ended'; }
            isActive() { return this.status === 'running' || this.status === 'paused'; }

            // 状态切换方法
            start() {
                if (this.isIdle() || this.isEnded()) {
                    this.status = 'running';
                    this.lastCollisionType = null;
                    return true;
                }
                return false;
            }

            pause() {
                if (this.isRunning()) {
                    this.status = 'paused';
                    return true;
                }
                return false;
            }

            resume() {
                if (this.isPaused()) {
                    this.status = 'running';
                    return true;
                }
                return false;
            }

            togglePause() {
                if (this.isRunning()) {
                    return this.pause();
                } else if (this.isPaused()) {
                    return this.resume();
                }
                return false;
            }

            end(collisionType = null) {
                if (this.isRunning() || this.isPaused()) {
                    this.status = 'ended';
                    this.lastCollisionType = collisionType;
                    return true;
                }
                return false;
            }

            restart() {
                this.status = 'running';
                this.lastCollisionType = null;
                return true;
            }

            // 获取状态描述文本
            getStatusText() {
                const texts = {
                    'idle': '等待开始',
                    'running': '游戏中',
                    'paused': '已暂停',
                    'ended': '游戏结束'
                };
                return texts[this.status] || '未知状态';
            }
        }

        // 创建游戏状态实例
        const gameState = new GameState();

        // ==================== 难度系统 ====================
        class DifficultySystem {
            constructor() {
                this.levels = {
                    slow: { fps: 6, name: '慢速', color: '#4CAF50' },
                    medium: { fps: 10, name: '中速', color: '#ffcc00' },
                    fast: { fps: 15, name: '快速', color: '#ff6b6b' }
                };
                this.currentLevel = 'medium';
                this.buttons = {};
            }

            // 获取当前FPS
            getFPS() {
                return this.levels[this.currentLevel].fps;
            }

            // 获取当前难度名称
            getName() {
                return this.levels[this.currentLevel].name;
            }

            // 获取当前难度颜色
            getColor() {
                return this.levels[this.currentLevel].color;
            }

            // 设置难度
            setLevel(level) {
                if (this.levels[level]) {
                    this.currentLevel = level;
                    this.updateButtonStates();
                    // 如果游戏正在运行，动态调整速度
                    if (gameState.isRunning() && gameLoop.running) {
                        gameLoop.setSpeed(this.getFPS());
                    }
                    console.log('难度设置为:', this.getName(), 'FPS:', this.getFPS());
                    return true;
                }
                return false;
            }

            // 初始化按钮引用
            initButtons() {
                this.buttons = {
                    slow: document.getElementById('diffSlow'),
                    medium: document.getElementById('diffMedium'),
                    fast: document.getElementById('diffFast')
                };
                this.setupButtonEvents();
                this.updateButtonStates();
            }

            // 设置按钮点击事件
            setupButtonEvents() {
                Object.keys(this.buttons).forEach(level => {
                    this.buttons[level].addEventListener('click', () => {
                        // 游戏进行中不允许切换难度
                        if (gameState.isRunning()) {
                            showKeyFeedback('游戏中无法切换难度!', '#ff6b6b');
                            return;
                        }
                        this.setLevel(level);
                    });
                });
            }

            // 更新按钮状态
            updateButtonStates() {
                Object.keys(this.buttons).forEach(level => {
                    const btn = this.buttons[level];
                    if (btn) {
                        btn.classList.toggle('active', level === this.currentLevel);
                        // 游戏运行时禁用所有按钮
                        btn.disabled = gameState.isRunning();
                    }
                });
            }
        }

        // 创建难度系统实例
        const difficultySystem = new DifficultySystem();

        // ==================== 分数系统 ====================
        class ScoreSystem {
            constructor() {
                this.score = 0;
                this.highScore = this.loadHighScore();
                this.level = 1;
                this.levelThresholds = [0, 50, 100, 200, 300, 500, 800, 1200]; // 各等级分数阈值
            }

            // 从localStorage加载最高分
            loadHighScore() {
                const saved = localStorage.getItem('snakeHighScore');
                return saved ? parseInt(saved, 10) : 0;
            }

            // 保存最高分到localStorage
            saveHighScore() {
                localStorage.setItem('snakeHighScore', this.highScore.toString());
            }

            // 重置分数
            reset() {
                this.score = 0;
                this.level = 1;
                this.updateDisplay();
            }

            // 增加分数
            addScore(points) {
                this.score += points;

                // 检查是否刷新最高分
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    this.saveHighScore();
                    this.showNewHighScoreEffect();
                }

                // 更新等级
                this.updateLevel();
                this.updateDisplay();
            }

            // 获取当前等级进度百分比
            getLevelProgress() {
                const currentThreshold = this.levelThresholds[this.level - 1] || 0;
                const nextThreshold = this.levelThresholds[this.level] || this.levelThresholds[this.levelThresholds.length - 1];
                if (nextThreshold === currentThreshold) return 100;
                const progress = ((this.score - currentThreshold) / (nextThreshold - currentThreshold)) * 100;
                return Math.min(Math.max(progress, 0), 100);
            }

            // 更新等级
            updateLevel() {
                for (let i = this.levelThresholds.length - 1; i >= 0; i--) {
                    if (this.score >= this.levelThresholds[i]) {
                        if (this.level !== i + 1) {
                            this.level = i + 1;
                            this.showLevelUpEffect();
                        }
                        break;
                    }
                }
            }

            // 更新界面显示
            updateDisplay() {
                scoreElement.textContent = this.score;
                highScoreElement.textContent = this.highScore;
                levelElement.textContent = this.level;
                levelProgressElement.style.width = this.getLevelProgress() + '%';
            }

            // 显示新最高分效果
            showNewHighScoreEffect() {
                highScoreElement.style.color = '#ff4757';
                highScoreElement.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    highScoreElement.style.color = '#ffcc00';
                    highScoreElement.style.transform = 'scale(1)';
                }, 500);
            }

            // 显示升级效果
            showLevelUpEffect() {
                levelElement.style.color = '#ff6b6b';
                levelElement.style.transform = 'scale(1.5)';
                setTimeout(() => {
                    levelElement.style.color = '#00ff88';
                    levelElement.style.transform = 'scale(1)';
                }, 600);
            }
        }

        // 创建分数系统实例
        const scoreSystem = new ScoreSystem();

        // 初始化显示
        scoreSystem.updateDisplay();

        // ==================== 方向常量 ====================
        const Direction = {
            UP: { x: 0, y: -1 },
            DOWN: { x: 0, y: 1 },
            LEFT: { x: -1, y: 0 },
            RIGHT: { x: 1, y: 0 }
        };

        // ==================== 蛇类定义 ====================
        class Snake {
            constructor() {
                this.body = [];           // 蛇身数组，存储各段位置 {x, y}
                this.direction = Direction.RIGHT;  // 当前移动方向
                this.nextDirection = Direction.RIGHT; // 下一帧的方向（防止快速按键反转）
                this.growing = false;    // 是否正在生长
            }

            // 初始化蛇（在画布中央）
            init() {
                const centerX = Math.floor(gridCount / 2);
                const centerY = Math.floor(gridCount / 2);

                // 初始蛇身长度为3，水平排列
                this.body = [
                    { x: centerX, y: centerY },         // 头部
                    { x: centerX - 1, y: centerY },    // 身体
                    { x: centerX - 2, y: centerY }     // 尾部
                ];
                this.direction = Direction.RIGHT;
                this.nextDirection = Direction.RIGHT;
                this.growing = false;
            }

            // 获取蛇头位置
            getHead() {
                return this.body[0];
            }

            // 设置移动方向（防止180度反转）
            setDirection(newDirection) {
                // 检查是否为反向移动
                const isOpposite =
                    (this.direction.x + newDirection.x === 0) &&
                    (this.direction.y + newDirection.y === 0);

                if (!isOpposite) {
                    this.nextDirection = newDirection;
                    return true;  // 方向设置成功
                }
                return false;  // 方向设置失败（反向移动）
            }

            // 设置方向并返回是否成功（带反馈）
            setDirectionWithFeedback(newDirection) {
                return this.setDirection(newDirection);
            }

            // 移动蛇
            move() {
                // 应用缓冲的方向
                this.direction = this.nextDirection;

                // 计算新头部位置
                const head = this.getHead();
                const newHead = {
                    x: head.x + this.direction.x,
                    y: head.y + this.direction.y
                };

                // 在头部添加新位置
                this.body.unshift(newHead);

                // 如果没有在生长，移除尾部
                if (!this.growing) {
                    this.body.pop();
                } else {
                    this.growing = false;
                }

                return newHead;
            }

            // 生长（吃食物时调用）
            grow() {
                this.growing = true;
            }

            // 检查是否撞到自己
            checkSelfCollision() {
                const head = this.getHead();
                // 从第1个元素开始检查（跳过头部自己）
                for (let i = 1; i < this.body.length; i++) {
                    if (head.x === this.body[i].x && head.y === this.body[i].y) {
                        return true;
                    }
                }
                return false;
            }

            // 检查是否撞墙
            checkWallCollision() {
                const head = this.getHead();
                return head.x < 0 || head.x >= gridCount ||
                       head.y < 0 || head.y >= gridCount;
            }

            // 获取碰撞类型（返回 'wall', 'self', 或 null）
            getCollisionType() {
                if (this.checkWallCollision()) {
                    return 'wall';
                }
                if (this.checkSelfCollision()) {
                    return 'self';
                }
                return null;
            }

            // 获取撞墙的具体方向信息
            getWallCollisionDetail() {
                const head = this.getHead();
                if (head.x < 0) return 'left';
                if (head.x >= gridCount) return 'right';
                if (head.y < 0) return 'top';
                if (head.y >= gridCount) return 'bottom';
                return null;
            }

            // 检查位置是否在蛇身上
            isOnSnake(x, y) {
                return this.body.some(segment => segment.x === x && segment.y === y);
            }

            // 绘制蛇（支持发光效果和渐变蛇身）
            draw(ctx) {
                // 计算是否处于发光状态
                const isGlowing = snakeGlowFrames > 0;

                this.body.forEach((segment, index) => {
                    let color;
                    if (index === 0) {
                        // 蛇头：使用金黄色，发光时更亮
                        color = isGlowing ? '#ffee66' : colors.snakeHead;
                    } else {
                        // 蛇身：使用渐变效果，从头部向尾部逐渐变暗
                        const progress = index / (this.body.length - 1 || 1);
                        color = this.interpolateColor(
                            isGlowing ? '#44dd88' : colors.snakeBodyStart,
                            isGlowing ? '#22aa55' : colors.snakeBodyEnd,
                            progress
                        );
                    }
                    const radius = index === 0 ? 5 : 3; // 头部更圆润

                    // 计算像素位置
                    const padding = 1;
                    const size = gridSize - padding * 2;
                    const px = segment.x * gridSize + padding;
                    const py = segment.y * gridSize + padding;

                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.roundRect(px, py, size, size, radius);
                    ctx.fill();

                    // 发光时添加光晕效果
                    if (isGlowing && index === 0) {
                        ctx.strokeStyle = '#ffdd88';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }

                    // 为蛇头添加眼睛
                    if (index === 0) {
                        this.drawEyes(ctx, segment);
                    }
                });
            }

            // 颜色渐变插值函数
            interpolateColor(color1, color2, progress) {
                // 解析颜色
                const r1 = parseInt(color1.slice(1, 3), 16);
                const g1 = parseInt(color1.slice(3, 5), 16);
                const b1 = parseInt(color1.slice(5, 7), 16);

                const r2 = parseInt(color2.slice(1, 3), 16);
                const g2 = parseInt(color2.slice(3, 5), 16);
                const b2 = parseInt(color2.slice(5, 7), 16);

                // 计算插值
                const r = Math.round(r1 + (r2 - r1) * progress);
                const g = Math.round(g1 + (g2 - g1) * progress);
                const b = Math.round(b1 + (b2 - b1) * progress);

                // 返回十六进制颜色
                return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
            }

            // 绘制蛇眼
            drawEyes(ctx, head) {
                const eyeSize = 3;
                const eyeOffset = 5;
                ctx.fillStyle = '#ffffff';

                let eye1X, eye1Y, eye2X, eye2Y;
                const centerX = head.x * gridSize + gridSize / 2;
                const centerY = head.y * gridSize + gridSize / 2;

                // 根据方向调整眼睛位置
                if (this.direction === Direction.RIGHT) {
                    eye1X = centerX + 3; eye1Y = centerY - eyeOffset;
                    eye2X = centerX + 3; eye2Y = centerY + eyeOffset;
                } else if (this.direction === Direction.LEFT) {
                    eye1X = centerX - 3; eye1Y = centerY - eyeOffset;
                    eye2X = centerX - 3; eye2Y = centerY + eyeOffset;
                } else if (this.direction === Direction.UP) {
                    eye1X = centerX - eyeOffset; eye1Y = centerY - 3;
                    eye2X = centerX + eyeOffset; eye2Y = centerY - 3;
                } else { // DOWN
                    eye1X = centerX - eyeOffset; eye1Y = centerY + 3;
                    eye2X = centerX + eyeOffset; eye2Y = centerY + 3;
                }

                // 绘制两只眼睛
                ctx.beginPath();
                ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== 食物类定义 ====================
        class Food {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.visible = true;
            }

            // 随机生成食物位置（确保不在蛇身上）
            spawn(snake) {
                let attempts = 0;
                const maxAttempts = 100;  // 最大尝试次数，防止死循环

                do {
                    // 随机生成位置
                    this.x = Math.floor(Math.random() * gridCount);
                    this.y = Math.floor(Math.random() * gridCount);
                    attempts++;
                } while (snake.isOnSnake(this.x, this.y) && attempts < maxAttempts);

                // 如果尝试次数过多，尝试找到空位
                if (attempts >= maxAttempts) {
                    this.findEmptyPosition(snake);
                }

                this.visible = true;
            }

            // 寻找空位置（当随机生成失败时）
            findEmptyPosition(snake) {
                for (let x = 0; x < gridCount; x++) {
                    for (let y = 0; y < gridCount; y++) {
                        if (!snake.isOnSnake(x, y)) {
                            this.x = x;
                            this.y = y;
                            return;
                        }
                    }
                }
                // 如果没有空位，游戏胜利（蛇填满整个画布）
                this.visible = false;
            }

            // 检查蛇是否吃到食物
            isEaten(headX, headY) {
                return this.x === headX && this.y === headY;
            }

            // 绘制食物
            draw(ctx) {
                if (!this.visible) return;

                // 计算像素位置
                const padding = 2;
                const size = gridSize - padding * 2;
                const px = this.x * gridSize + padding;
                const py = this.y * gridSize + padding;

                // 绘制食物主体（圆形）
                ctx.fillStyle = colors.food;
                ctx.beginPath();
                ctx.arc(this.x * gridSize + gridSize / 2, this.y * gridSize + gridSize / 2, size / 2, 0, Math.PI * 2);
                ctx.fill();

                // 添加高光效果
                ctx.fillStyle = '#ffaaaa';
                ctx.beginPath();
                ctx.arc(this.x * gridSize + gridSize / 2 - 2, this.y * gridSize + gridSize / 2 - 2, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== 创建蛇实例 ====================
        const snake = new Snake();

        // ==================== 创建食物实例 ====================
        const food = new Food();

        // ==================== 吃食物视觉效果 ====================
        let eatEffectParticles = [];
        let scoreFlashTimeout = null;
        let snakeGlowFrames = 0;

        // 显示吃食物效果（星星粒子）
        function showEatEffect(x, y) {
            // 在食物位置生成星星粒子
            const centerX = x * gridSize + gridSize / 2;
            const centerY = y * gridSize + gridSize / 2;

            // 创建8个星星粒子向四周扩散
            for (let i = 0; i < 8; i++) {
                const angle = (i * 45) * Math.PI / 180;
                eatEffectParticles.push({
                    x: centerX,
                    y: centerY,
                    vx: Math.cos(angle) * 3,
                    vy: Math.sin(angle) * 3,
                    life: 15,  // 粒子生命周期（帧数）
                    size: 4,
                    color: '#ffcc00'
                });
            }

            // 触发蛇身发光效果
            snakeGlowFrames = 6;
        }

        // 绘制吃食物粒子效果
        function drawEatParticles() {
            eatEffectParticles = eatEffectParticles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.size *= 0.9;

                if (p.life > 0) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 15;
                    ctx.beginPath();
                    // 绘制星星形状
                    drawStar(ctx, p.x, p.y, p.size);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    return true;
                }
                return false;
            });
        }

        // 绘制星星形状
        function drawStar(ctx, cx, cy, size) {
            const spikes = 4;
            const outerRadius = size;
            const innerRadius = size / 2;

            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            const step = Math.PI / spikes;

            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        // 分数增加动画效果
        function animateScoreIncrease() {
            scoreElement.style.color = '#ffcc00';
            scoreElement.style.fontWeight = 'bold';
            scoreElement.style.transform = 'scale(1.3)';

            if (scoreFlashTimeout) {
                clearTimeout(scoreFlashTimeout);
            }

            scoreFlashTimeout = setTimeout(() => {
                scoreElement.style.color = '#ffffff';
                scoreElement.style.fontWeight = 'normal';
                scoreElement.style.transform = 'scale(1)';
            }, 300);
        }

        // ==================== 网格绘制函数 ====================
        function drawGrid() {
            // 绘制背景
            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线
            ctx.strokeStyle = colors.gridLine;
            ctx.lineWidth = 0.5;

            // 垂直线
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // 水平线
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        // ==================== 基础渲染框架 ====================
        class GameRenderer {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.entities = [];
            }

            // 添加实体到渲染队列
            addEntity(entity) {
                this.entities.push(entity);
            }

            // 移除实体
            removeEntity(entity) {
                const index = this.entities.indexOf(entity);
                if (index > -1) {
                    this.entities.splice(index, 1);
                }
            }

            // 清空渲染队列
            clearEntities() {
                this.entities = [];
            }

            // 渲染所有实体
            render() {
                // 清除画布并绘制网格
                drawGrid();

                // 渲染所有实体
                this.entities.forEach(entity => {
                    if (entity.visible !== false && typeof entity.draw === 'function') {
                        entity.draw(this.ctx);
                    }
                });
            }

            // 绘制矩形网格单元
            drawCell(x, y, color, radius = 3) {
                const padding = 1;
                const size = gridSize - padding * 2;
                const px = x * gridSize + padding;
                const py = y * gridSize + padding;

                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.roundRect(px, py, size, size, radius);
                this.ctx.fill();
            }

            // 绘制文本
            drawText(text, x, y, options = {}) {
                const {
                    color = colors.text,
                    font = '20px Microsoft YaHei',
                    align = 'center',
                    baseline = 'middle'
                } = options;

                this.ctx.fillStyle = color;
                this.ctx.font = font;
                this.ctx.textAlign = align;
                this.ctx.textBaseline = baseline;
                this.ctx.fillText(text, x, y);
            }
        }

        // ==================== 游戏循环框架 ====================
        class GameLoop {
            constructor(fps = 10) {
                this.fps = fps;
                this.frameTime = 1000 / fps;
                this.lastTime = 0;
                this.running = false;
                this.updateCallback = null;
                this.renderCallback = null;
            }

            setSpeed(fps) {
                this.fps = fps;
                this.frameTime = 1000 / fps;
            }

            start() {
                this.running = true;
                this.lastTime = performance.now();
                this.loop();
            }

            stop() {
                this.running = false;
            }

            loop() {
                if (!this.running) return;

                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastTime;

                if (deltaTime >= this.frameTime) {
                    this.lastTime = currentTime - (deltaTime % this.frameTime);

                    // 执行更新和渲染回调
                    if (this.updateCallback) this.updateCallback();
                    if (this.renderCallback) this.renderCallback();
                }

                requestAnimationFrame(() => this.loop());
            }

            onUpdate(callback) {
                this.updateCallback = callback;
            }

            onRender(callback) {
                this.renderCallback = callback;
            }
        }

        // ==================== 初始化实例 ====================
        const renderer = new GameRenderer(canvas, ctx);
        const gameLoop = new GameLoop(difficultySystem.getFPS()); // 使用难度系统FPS

        // ==================== 初始化显示 ====================
        function init() {
            drawGrid();
            renderer.drawText('按空格键开始游戏', canvas.width / 2, canvas.height / 2);
            // 初始化难度系统按钮
            difficultySystem.initButtons();
        }

        // ==================== 键盘事件监听 ====================
        document.addEventListener('keydown', (e) => {
            // 空格键：开始/暂停游戏
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState.isIdle() || gameState.isEnded()) {
                    startGame();
                } else {
                    togglePause();
                }
                return;
            }

            // 方向键控制（仅游戏运行中时响应）
            if (gameState.isRunning()) {
                let newDirection = null;

                // 方向键支持
                switch (e.code) {
                    case 'ArrowUp':
                    case 'KeyW':    // WASD: W键向上
                        e.preventDefault();
                        newDirection = Direction.UP;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':    // WASD: S键向下
                        e.preventDefault();
                        newDirection = Direction.DOWN;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':    // WASD: A键向左
                        e.preventDefault();
                        newDirection = Direction.LEFT;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':    // WASD: D键向右
                        e.preventDefault();
                        newDirection = Direction.RIGHT;
                        break;
                }

                // 设置方向并显示反馈
                if (newDirection) {
                    const accepted = snake.setDirectionWithFeedback(newDirection);
                    if (!accepted) {
                        // 显示无效按键提示（180度反转被阻止）
                        showKeyFeedback('禁止反向移动!', '#ff6b6b');
                    }
                }
            }
        });

        // ==================== 按钮点击事件 ====================
        btnStart.addEventListener('click', () => {
            if (gameState.isIdle() || gameState.isEnded()) {
                startGame();
            }
        });

        btnPause.addEventListener('click', () => {
            if (gameState.isActive()) {
                togglePause();
            }
        });

        btnRestart.addEventListener('click', () => {
            if (!gameState.isIdle()) {
                restartGame();
            }
        });

        // ==================== 按键反馈提示 ====================
let keyFeedbackTimeout = null;

function showKeyFeedback(text, color = '#ffcc00') {
    // 清除之前的提示
    if (keyFeedbackTimeout) {
        clearTimeout(keyFeedbackTimeout);
    }

    // 显示反馈
    const feedbackElement = document.querySelector('.controls');
    const originalText = feedbackElement.innerHTML;

    // 创建临时提示
    feedbackElement.innerHTML = `<p style="color: ${color}; font-weight: bold;">${text}</p>`;

    // 500ms后恢复原文本
    keyFeedbackTimeout = setTimeout(() => {
        feedbackElement.innerHTML = originalText;
    }, 500);
}

// ==================== 按钮状态更新 ====================
function updateButtonStates() {
    // 开始按钮：仅在 idle 或 ended 状态可用
    btnStart.disabled = gameState.isRunning();
    btnStart.textContent = gameState.isEnded() ? '重新开始' : '开始游戏';

    // 暂停按钮：仅在 running 或 paused 状态可用
    btnPause.disabled = !gameState.isActive();
    btnPause.textContent = gameState.isPaused() ? '继续' : '暂停';

    // 重新开始按钮：仅在游戏激活或结束时可用
    btnRestart.disabled = gameState.isIdle();
}

// ==================== 游戏控制函数 ====================
        function startGame() {
            gameState.start();
            scoreSystem.reset();

            // 初始化蛇
            snake.init();
            renderer.clearEntities();
            renderer.addEntity(snake);

            // 初始化食物
            food.spawn(snake);
            renderer.addEntity(food);

            // 使用难度系统的FPS
            gameLoop.setSpeed(difficultySystem.getFPS());
            gameLoop.start();
            updateButtonStates();
            difficultySystem.updateButtonStates();
            console.log('游戏开始 - 状态:', gameState.getStatusText(), '- 难度:', difficultySystem.getName());
        }

        function togglePause() {
            gameState.togglePause();
            if (gameState.isPaused()) {
                gameLoop.stop();
                renderer.render();  // 保持当前画面
                renderer.drawText('游戏暂停', canvas.width / 2, canvas.height / 2);
            } else {
                gameLoop.start();
            }
            updateButtonStates();
            difficultySystem.updateButtonStates(); // 暂停时更新难度按钮状态
            console.log(gameState.isPaused() ? '游戏暂停' : '游戏继续', '- 状态:', gameState.getStatusText());
        }

        function resumeGame() {
            if (gameState.isPaused()) {
                gameState.resume();
                gameLoop.start();
                updateButtonStates();
                console.log('游戏继续 - 状态:', gameState.getStatusText());
            }
        }

        function restartGame() {
            gameState.restart();
            scoreSystem.reset();

            // 重新初始化蛇
            snake.init();
            renderer.clearEntities();
            renderer.addEntity(snake);

            // 重新初始化食物
            food.spawn(snake);
            renderer.addEntity(food);

            // 使用难度系统的FPS
            gameLoop.setSpeed(difficultySystem.getFPS());
            gameLoop.start();
            updateButtonStates();
            difficultySystem.updateButtonStates();
            console.log('游戏重新开始 - 状态:', gameState.getStatusText(), '- 难度:', difficultySystem.getName());
        }

        function gameOver(collisionType = null) {
            gameState.end(collisionType || snake.getCollisionType());
            gameLoop.stop();

            // 显示碰撞闪烁效果
            showCollisionEffect();

            // 延迟显示游戏结束界面（让玩家看到碰撞位置）
            setTimeout(() => {
                renderer.render();
                drawGameOverScreen();
            }, 500);

            updateButtonStates();
            difficultySystem.updateButtonStates(); // 游戏结束后启用难度选择
            console.log('游戏结束，分数:', scoreSystem.score, '最高分:', scoreSystem.highScore, '碰撞类型:', gameState.lastCollisionType, '- 状态:', gameState.getStatusText());
        }

        // ==================== 碰撞视觉效果 ====================
        function showCollisionEffect() {
            // 绘制碰撞位置高亮
            const head = snake.getHead();
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();

            // 在蛇头位置绘制闪烁标记
            const px = head.x * gridSize;
            const py = head.y * gridSize;

            // 绘制红色闪烁框
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 3;
            ctx.strokeRect(px, py, gridSize, gridSize);

            // 绘制X标记
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(px + gridSize, py + gridSize);
            ctx.moveTo(px + gridSize, py);
            ctx.lineTo(px, py + gridSize);
            ctx.stroke();
        }

        // ==================== 游戏结束界面 ====================
        function drawGameOverScreen() {
            // 半透明背景遮罩
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 获取碰撞原因描述
            let collisionReason = '';
            if (gameState.lastCollisionType === 'wall') {
                const wallDetail = snake.getWallCollisionDetail();
                const wallNames = {
                    'left': '左边界',
                    'right': '右边界',
                    'top': '上边界',
                    'bottom': '下边界'
                };
                collisionReason = `撞到${wallNames[wallDetail] || '墙壁'}！`;
            } else if (gameState.lastCollisionType === 'self') {
                collisionReason = '撞到自己的身体！';
            }

            // 显示游戏结束标题
            renderer.drawText('游戏结束!', canvas.width / 2, canvas.height / 2 - 40, {
                color: '#ff6b6b',
                font: 'bold 28px Microsoft YaHei'
            });

            // 显示碰撞原因
            if (collisionReason) {
                renderer.drawText(collisionReason, canvas.width / 2, canvas.height / 2 - 10, {
                    color: '#ffcc00',
                    font: '18px Microsoft YaHei'
                });
            }

            // 显示最终分数
            renderer.drawText(`最终分数: ${scoreSystem.score}`, canvas.width / 2, canvas.height / 2 + 20, {
                color: '#ffffff',
                font: '22px Microsoft YaHei'
            });

            // 显示最高分和等级
            renderer.drawText(`最高分: ${scoreSystem.highScore} | 等级: ${scoreSystem.level}`, canvas.width / 2, canvas.height / 2 + 45, {
                color: '#ffcc00',
                font: '16px Microsoft YaHei'
            });

            // 显示当前难度
            renderer.drawText(`难度: ${difficultySystem.getName()}`, canvas.width / 2, canvas.height / 2 + 65, {
                color: difficultySystem.getColor(),
                font: '14px Microsoft YaHei'
            });

            // 显示重新开始提示
            renderer.drawText('按空格键或点击按钮重新开始', canvas.width / 2, canvas.height / 2 + 90, {
                color: '#00ff88',
                font: '16px Microsoft YaHei'
            });
        }

        // 设置游戏循环回调
        gameLoop.onUpdate(() => {
            // 移动蛇
            snake.move();

            // 检查碰撞（先检查墙壁，再检查自身）
            const collisionType = snake.getCollisionType();
            if (collisionType) {
                gameOver(collisionType);
                return;
            }

            // 检查是否吃到食物
            const head = snake.getHead();
            if (food.isEaten(head.x, head.y)) {
                // 蛇生长
                snake.grow();
                // 更新分数（每吃一个食物加10分）
                scoreSystem.addScore(10);
                // 显示吃食物视觉效果
                showEatEffect(food.x, food.y);
                // 分数增加动画
                animateScoreIncrease();
                // 生成新食物
                food.spawn(snake);
                console.log('吃到食物！分数:', scoreSystem.score, '等级:', scoreSystem.level);
            }

            // 更新发光效果帧数
            if (snakeGlowFrames > 0) {
                snakeGlowFrames--;
            }
        });

        gameLoop.onRender(() => {
            renderer.render();
            // 绘制吃食物粒子效果
            drawEatParticles();
        });

        // 初始化游戏
        init();
    </script>
