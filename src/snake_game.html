<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        /* 样式区域 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background-color: #0f0f23;
        }

        .score-board {
            color: #ffffff;
            font-size: 1.5rem;
            margin-top: 15px;
        }

        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇游戏</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="score-board">
            分数: <span id="score">0</span>
        </div>
        <div class="controls">
            <p>使用方向键 ↑ ↓ ← → 控制蛇的移动</p>
            <p>按空格键开始/暂停游戏</p>
        </div>
    </div>

    <script>
        // ==================== Canvas游戏画布实现 ====================

        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // ==================== 游戏配置 ====================
        const gridSize = 20;           // 每个网格的大小（像素）
        const gridCount = canvas.width / gridSize;  // 网格数量
        const colors = {
            background: '#0f0f23',
            grid: '#1a1a3e',
            gridLine: '#252550',
            snakeHead: '#00ff88',
            snakeBody: '#00cc66',
            food: '#ff6b6b',
            text: '#ffffff'
        };

        // ==================== 游戏状态 ====================
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;

        // ==================== 方向常量 ====================
        const Direction = {
            UP: { x: 0, y: -1 },
            DOWN: { x: 0, y: 1 },
            LEFT: { x: -1, y: 0 },
            RIGHT: { x: 1, y: 0 }
        };

        // ==================== 蛇类定义 ====================
        class Snake {
            constructor() {
                this.body = [];           // 蛇身数组，存储各段位置 {x, y}
                this.direction = Direction.RIGHT;  // 当前移动方向
                this.nextDirection = Direction.RIGHT; // 下一帧的方向（防止快速按键反转）
                this.growing = false;    // 是否正在生长
            }

            // 初始化蛇（在画布中央）
            init() {
                const centerX = Math.floor(gridCount / 2);
                const centerY = Math.floor(gridCount / 2);

                // 初始蛇身长度为3，水平排列
                this.body = [
                    { x: centerX, y: centerY },         // 头部
                    { x: centerX - 1, y: centerY },    // 身体
                    { x: centerX - 2, y: centerY }     // 尾部
                ];
                this.direction = Direction.RIGHT;
                this.nextDirection = Direction.RIGHT;
                this.growing = false;
            }

            // 获取蛇头位置
            getHead() {
                return this.body[0];
            }

            // 设置移动方向（防止180度反转）
            setDirection(newDirection) {
                // 检查是否为反向移动
                const isOpposite =
                    (this.direction.x + newDirection.x === 0) &&
                    (this.direction.y + newDirection.y === 0);

                if (!isOpposite) {
                    this.nextDirection = newDirection;
                }
            }

            // 移动蛇
            move() {
                // 应用缓冲的方向
                this.direction = this.nextDirection;

                // 计算新头部位置
                const head = this.getHead();
                const newHead = {
                    x: head.x + this.direction.x,
                    y: head.y + this.direction.y
                };

                // 在头部添加新位置
                this.body.unshift(newHead);

                // 如果没有在生长，移除尾部
                if (!this.growing) {
                    this.body.pop();
                } else {
                    this.growing = false;
                }

                return newHead;
            }

            // 生长（吃食物时调用）
            grow() {
                this.growing = true;
            }

            // 检查是否撞到自己
            checkSelfCollision() {
                const head = this.getHead();
                // 从第1个元素开始检查（跳过头部自己）
                for (let i = 1; i < this.body.length; i++) {
                    if (head.x === this.body[i].x && head.y === this.body[i].y) {
                        return true;
                    }
                }
                return false;
            }

            // 检查是否撞墙
            checkWallCollision() {
                const head = this.getHead();
                return head.x < 0 || head.x >= gridCount ||
                       head.y < 0 || head.y >= gridCount;
            }

            // 检查位置是否在蛇身上
            isOnSnake(x, y) {
                return this.body.some(segment => segment.x === x && segment.y === y);
            }

            // 绘制蛇
            draw(ctx) {
                this.body.forEach((segment, index) => {
                    const color = index === 0 ? colors.snakeHead : colors.snakeBody;
                    const radius = index === 0 ? 5 : 3; // 头部更圆润

                    // 计算像素位置
                    const padding = 1;
                    const size = gridSize - padding * 2;
                    const px = segment.x * gridSize + padding;
                    const py = segment.y * gridSize + padding;

                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.roundRect(px, py, size, size, radius);
                    ctx.fill();

                    // 为蛇头添加眼睛
                    if (index === 0) {
                        this.drawEyes(ctx, segment);
                    }
                });
            }

            // 绘制蛇眼
            drawEyes(ctx, head) {
                const eyeSize = 3;
                const eyeOffset = 5;
                ctx.fillStyle = '#ffffff';

                let eye1X, eye1Y, eye2X, eye2Y;
                const centerX = head.x * gridSize + gridSize / 2;
                const centerY = head.y * gridSize + gridSize / 2;

                // 根据方向调整眼睛位置
                if (this.direction === Direction.RIGHT) {
                    eye1X = centerX + 3; eye1Y = centerY - eyeOffset;
                    eye2X = centerX + 3; eye2Y = centerY + eyeOffset;
                } else if (this.direction === Direction.LEFT) {
                    eye1X = centerX - 3; eye1Y = centerY - eyeOffset;
                    eye2X = centerX - 3; eye2Y = centerY + eyeOffset;
                } else if (this.direction === Direction.UP) {
                    eye1X = centerX - eyeOffset; eye1Y = centerY - 3;
                    eye2X = centerX + eyeOffset; eye2Y = centerY - 3;
                } else { // DOWN
                    eye1X = centerX - eyeOffset; eye1Y = centerY + 3;
                    eye2X = centerX + eyeOffset; eye2Y = centerY + 3;
                }

                // 绘制两只眼睛
                ctx.beginPath();
                ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== 创建蛇实例 ====================
        const snake = new Snake();

        // ==================== 网格绘制函数 ====================
        function drawGrid() {
            // 绘制背景
            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线
            ctx.strokeStyle = colors.gridLine;
            ctx.lineWidth = 0.5;

            // 垂直线
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // 水平线
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        // ==================== 基础渲染框架 ====================
        class GameRenderer {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.entities = [];
            }

            // 添加实体到渲染队列
            addEntity(entity) {
                this.entities.push(entity);
            }

            // 移除实体
            removeEntity(entity) {
                const index = this.entities.indexOf(entity);
                if (index > -1) {
                    this.entities.splice(index, 1);
                }
            }

            // 清空渲染队列
            clearEntities() {
                this.entities = [];
            }

            // 渲染所有实体
            render() {
                // 清除画布并绘制网格
                drawGrid();

                // 渲染所有实体
                this.entities.forEach(entity => {
                    if (entity.visible !== false && typeof entity.draw === 'function') {
                        entity.draw(this.ctx);
                    }
                });
            }

            // 绘制矩形网格单元
            drawCell(x, y, color, radius = 3) {
                const padding = 1;
                const size = gridSize - padding * 2;
                const px = x * gridSize + padding;
                const py = y * gridSize + padding;

                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.roundRect(px, py, size, size, radius);
                this.ctx.fill();
            }

            // 绘制文本
            drawText(text, x, y, options = {}) {
                const {
                    color = colors.text,
                    font = '20px Microsoft YaHei',
                    align = 'center',
                    baseline = 'middle'
                } = options;

                this.ctx.fillStyle = color;
                this.ctx.font = font;
                this.ctx.textAlign = align;
                this.ctx.textBaseline = baseline;
                this.ctx.fillText(text, x, y);
            }
        }

        // ==================== 游戏循环框架 ====================
        class GameLoop {
            constructor(fps = 10) {
                this.fps = fps;
                this.frameTime = 1000 / fps;
                this.lastTime = 0;
                this.running = false;
                this.updateCallback = null;
                this.renderCallback = null;
            }

            setSpeed(fps) {
                this.fps = fps;
                this.frameTime = 1000 / fps;
            }

            start() {
                this.running = true;
                this.lastTime = performance.now();
                this.loop();
            }

            stop() {
                this.running = false;
            }

            loop() {
                if (!this.running) return;

                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastTime;

                if (deltaTime >= this.frameTime) {
                    this.lastTime = currentTime - (deltaTime % this.frameTime);

                    // 执行更新和渲染回调
                    if (this.updateCallback) this.updateCallback();
                    if (this.renderCallback) this.renderCallback();
                }

                requestAnimationFrame(() => this.loop());
            }

            onUpdate(callback) {
                this.updateCallback = callback;
            }

            onRender(callback) {
                this.renderCallback = callback;
            }
        }

        // ==================== 初始化实例 ====================
        const renderer = new GameRenderer(canvas, ctx);
        const gameLoop = new GameLoop(10);

        // ==================== 初始化显示 ====================
        function init() {
            drawGrid();
            renderer.drawText('按空格键开始游戏', canvas.width / 2, canvas.height / 2);
        }

        // ==================== 键盘事件监听 ====================
        document.addEventListener('keydown', (e) => {
            // 空格键：开始/暂停游戏
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning) {
                    startGame();
                } else {
                    togglePause();
                }
                return;
            }

            // 方向键控制（仅游戏运行中且未暂停时响应）
            if (gameRunning && !gamePaused) {
                switch (e.code) {
                    case 'ArrowUp':
                        e.preventDefault();
                        snake.setDirection(Direction.UP);
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        snake.setDirection(Direction.DOWN);
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        snake.setDirection(Direction.LEFT);
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        snake.setDirection(Direction.RIGHT);
                        break;
                }
            }
        });

        // ==================== 游戏控制函数 ====================
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            score = 0;
            scoreElement.textContent = score;

            // 初始化蛇
            snake.init();
            renderer.clearEntities();
            renderer.addEntity(snake);

            gameLoop.start();
            console.log('游戏开始');
        }

        function togglePause() {
            gamePaused = !gamePaused;
            if (gamePaused) {
                gameLoop.stop();
                renderer.render();  // 保持当前画面
                renderer.drawText('游戏暂停', canvas.width / 2, canvas.height / 2);
            } else {
                gameLoop.start();
            }
            console.log(gamePaused ? '游戏暂停' : '游戏继续');
        }

        function gameOver() {
            gameRunning = false;
            gameLoop.stop();
            renderer.render();
            renderer.drawText('游戏结束!', canvas.width / 2, canvas.height / 2 - 20, { color: '#ff6b6b' });
            renderer.drawText(`最终分数: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            console.log('游戏结束，分数:', score);
        }

        // 设置游戏循环回调
        gameLoop.onUpdate(() => {
            // 移动蛇
            snake.move();

            // 检查碰撞
            if (snake.checkWallCollision() || snake.checkSelfCollision()) {
                gameOver();
            }

            // 食物逻辑将在任务4实现
        });

        gameLoop.onRender(() => {
            renderer.render();
        });

        // 初始化游戏
        init();
    </script>
</body>
</html>
